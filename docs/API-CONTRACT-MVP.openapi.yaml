openapi: 3.0.3
info:
  title: Nursery Management System API — MVP
  version: 0.1.0
  description: |
    Canonical OpenAPI contract for the Nursery Management System MVP API.
    Aligned with current Gin route registration in `api/internal/app/bootstrap/bootstrap.go` and module handlers.
    Includes operational/debug routes and deferred proposed contracts.
  contact:
    name: Nursery MVP
servers:
  - url: /
    description: Same-origin (dev/proxy)

tags:
  - name: Health
    description: Health check and operational routes
  - name: Auth
    description: Authentication and session management
  - name: Password Reset
    description: Password reset flow
  - name: Invites
    description: Manager invite management and public acceptance
  - name: Children
    description: Child CRUD, lifecycle, and attendance list
  - name: Guardians
    description: Guardian CRUD and lifecycle
  - name: Guardian-Child Links
    description: Create and end guardian-child relationships
  - name: Parent Mappings
    description: Create and end parent membership-guardian mappings
  - name: Attendance
    description: Check-in, check-out, and corrections
  - name: Absence
    description: Absence markers
  - name: Funding
    description: Child funding profile management
  - name: Invoices
    description: Manager invoice draft generation, review, and issue
  - name: Parent Invoices
    description: Parent-facing invoice views
  - name: Payments
    description: Stripe checkout, webhooks, and payment diagnostics
  - name: Deferred
    description: Proposed contracts not yet implemented

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Authorization: Bearer <access_token>"
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly cookie set after login/refresh
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_token
      description: Readable cookie containing CSRF token value
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Must match csrf_token cookie value
    stripeSignature:
      type: apiKey
      in: header
      name: Stripe-Signature
      description: Stripe webhook signature header

  headers:
    X-Request-ID:
      description: Unique request identifier, preserved or generated
      schema:
        type: string
        format: uuid
    X-Correlation-ID:
      description: Correlation identifier for distributed tracing
      schema:
        type: string

  schemas:
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        request_id:
          type: string
          format: uuid
        details:
          description: Optional field-level details
          nullable: true
          type: object
          additionalProperties: true
      example:
        code: validation_error
        message: Invalid request payload.
        request_id: "00000000-0000-0000-0000-000000000001"
        details:
          field: email

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string
          format: uuid

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in_seconds:
          type: integer
        user:
          $ref: "#/components/schemas/UserResponse"
        active_membership:
          $ref: "#/components/schemas/MembershipResponse"
        available_memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipResponse"

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    MembershipResponse:
      type: object
      properties:
        membership_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        tenant_name:
          type: string
          description: Display-safe nursery/tenant name for picker labels
        branch_id:
          type: string
          format: uuid
        branch_name:
          type: string
          description: Display-safe branch name for picker labels
        role:
          type: string
          enum: [manager, practitioner, parent]

    MembershipSelectionRequiredResponse:
      type: object
      description: Pre-session membership selection challenge. No auth cookies, no access token, no session.
      required: [code, message, request_id, available_memberships]
      properties:
        code:
          type: string
          example: membership_selection_required
        message:
          type: string
          description: "Initial: 'Choose a nursery to continue.' Stale: 'That access is no longer available. Choose another nursery or contact your manager.'"
        request_id:
          type: string
          format: uuid
        available_memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipResponse"

    Child:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        core_hourly_rate_minor:
          type: integer
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
        left_at:
          type: string
          format: date-time
          nullable: true
        left_reason_code:
          type: string
          nullable: true
        left_reason_note:
          type: string
          nullable: true
        enrollment_complete:
          type: boolean
        missing_requirements:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Guardian:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
        deactivated_at:
          type: string
          format: date-time
          nullable: true
        deactivation_reason_code:
          type: string
          nullable: true
        deactivation_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GuardianChildLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        guardian_id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        ended_at:
          type: string
          format: date-time
          nullable: true
        ended_reason_code:
          type: string
          nullable: true
        ended_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ParentMembershipGuardianMapping:
      type: object
      properties:
        id:
          type: string
          format: uuid
        membership_id:
          type: string
          format: uuid
        guardian_id:
          type: string
          format: uuid
        ended_at:
          type: string
          format: date-time
          nullable: true
        ended_reason_code:
          type: string
          nullable: true
        ended_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, complete, corrected]
        check_in_at:
          type: string
          format: date-time
        check_out_at:
          type: string
          format: date-time
          nullable: true
        check_in_local_date:
          type: string
          format: date
        check_out_local_date:
          type: string
          format: date
          nullable: true
        duration_minutes:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceChild:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        enrollment_complete:
          type: boolean
        attendance_state:
          type: string
          enum: [not_checked_in, checked_in, absent]
        open_session_id:
          type: string
          format: uuid
          nullable: true
        checked_in_at:
          type: string
          format: date-time
          nullable: true
        has_incomplete_session:
          type: boolean
        absence_marker_id:
          type: string
          format: uuid
          nullable: true
        absence_marked_at:
          type: string
          format: date-time
          nullable: true

    AbsenceMarker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        local_date:
          type: string
          format: date
        marked_at:
          type: string
          format: date-time
        cleared_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FundingProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        billing_month:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}$"
        funded_allowance_minutes:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InviteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [practitioner, parent]
        status:
          type: string
          enum: [pending, accepted, revoked, expired]
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReasonRequest:
      type: object
      required: [reason_code]
      properties:
        reason_code:
          type: string
          enum:
            [
              duplicate_record,
              entered_in_error,
              left_nursery,
              safeguarding_direction,
              contact_update,
              access_revoked,
              other,
            ]
        reason_note:
          type: string
          description: Required when reason_code is other

    InvoicePeriod:
      type: object
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date

    InvoiceListItem:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_kind:
          type: string
          enum: [monthly]
        invoice_number:
          type: string
          nullable: true
        invoice_number_display:
          type: string
        child_id:
          type: string
          format: uuid
        child_name:
          type: string
        billing_month:
          type: string
        period:
          $ref: "#/components/schemas/InvoicePeriod"
        status:
          type: string
          enum: [draft, issued, payment_failed, paid, overdue]
        due_status:
          type: string
          enum: [not_due, due, overdue, paid]
        currency_code:
          type: string
        subtotal_minor:
          type: integer
        funded_deduction_minor:
          type: integer
        total_due_minor:
          type: integer
        amount_paid_minor:
          type: integer
        due_at:
          type: string
          format: date-time
          nullable: true
        issued_at:
          type: string
          format: date-time
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        payment_failed_at:
          type: string
          format: date-time
          nullable: true
        payment_status_updated_at:
          type: string
          format: date-time
          nullable: true
        generated_run_id:
          type: string
          format: uuid
          nullable: true
        generated_run_status:
          type: string
          nullable: true
        generated_run_started_at:
          type: string
          format: date-time
          nullable: true
        generated_run_completed_at:
          type: string
          format: date-time
          nullable: true
        generated_run_exception_count:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InvoiceDetail:
      type: object
      description: Full invoice detail including lines, calculation, and run exceptions
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_kind:
          type: string
          enum: [monthly]
        invoice_number:
          type: string
          nullable: true
        invoice_number_display:
          type: string
        child_id:
          type: string
          format: uuid
        child_name:
          type: string
        billing_month:
          type: string
        period:
          $ref: "#/components/schemas/InvoicePeriod"
        status:
          type: string
          enum: [draft, issued, payment_failed, paid, overdue]
        due_status:
          type: string
          enum: [not_due, due, overdue, paid]
        currency_code:
          type: string
        subtotal_minor:
          type: integer
        funded_deduction_minor:
          type: integer
        total_due_minor:
          type: integer
        amount_paid_minor:
          type: integer
        issued_at:
          type: string
          format: date-time
          nullable: true
        locked_at:
          type: string
          format: date-time
          nullable: true
        due_at:
          type: string
          format: date-time
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        payment_failed_at:
          type: string
          format: date-time
          nullable: true
        payment_status_updated_at:
          type: string
          format: date-time
          nullable: true
        adjusts_invoice_id:
          type: string
          format: uuid
          nullable: true
        adjustment_reason_code:
          type: string
          nullable: true
        adjustment_reason_note:
          type: string
          nullable: true
        generated_run_id:
          type: string
          format: uuid
          nullable: true
        generated_run_status:
          type: string
          nullable: true
        generated_run_started_at:
          type: string
          format: date-time
          nullable: true
        generated_run_completed_at:
          type: string
          format: date-time
          nullable: true
        generated_run_exception_count:
          type: integer
          nullable: true
        generated_run_exceptions:
          type: array
          items:
            type: object
            properties:
              child_id:
                type: string
              child_name:
                type: string
              blocker_codes:
                type: array
                items:
                  type: string
        calculation:
          type: object
          properties:
            core_hourly_rate_minor:
              type: integer
            raw_attended_minutes:
              type: integer
            rounded_attended_minutes:
              type: integer
            funded_allowance_minutes:
              type: integer
            funded_deduction_minutes:
              type: integer
            core_billable_minutes:
              type: integer
            included_session_count:
              type: integer
            core_subtotal_minor:
              type: integer
            extras_total_minor:
              type: integer
            source_sessions:
              type: array
              items:
                type: object
                properties:
                  session_id:
                    type: string
                  status:
                    type: string
                  check_in_at:
                    type: string
                  check_out_at:
                    type: string
                  raw_elapsed_minutes:
                    type: integer
                  rounded_billable_minutes:
                    type: integer
        lines:
          type: array
          items:
            type: object
            properties:
              line_id:
                type: string
              line_kind:
                type: string
              description:
                type: string
              sort_order:
                type: integer
              quantity_minutes:
                type: integer
                nullable: true
              unit_amount_minor:
                type: integer
                nullable: true
              line_amount_minor:
                type: integer
              raw_attended_minutes:
                type: integer
                nullable: true
              rounded_attended_minutes:
                type: integer
                nullable: true
              funded_allowance_minutes:
                type: integer
                nullable: true
              funded_deduction_minutes:
                type: integer
                nullable: true
              core_billable_minutes:
                type: integer
                nullable: true
              session_count:
                type: integer
                nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ParentInvoiceListItem:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_kind:
          type: string
          enum: [monthly]
        invoice_number:
          type: string
        invoice_number_display:
          type: string
        child_id:
          type: string
          format: uuid
        child_name:
          type: string
        billing_month:
          type: string
        period:
          $ref: "#/components/schemas/InvoicePeriod"
        status:
          type: string
          enum: [issued, payment_failed, paid, overdue]
        due_status:
          type: string
          enum: [due, overdue, paid]
        currency_code:
          type: string
        subtotal_minor:
          type: integer
        funded_deduction_minor:
          type: integer
        total_due_minor:
          type: integer
        amount_paid_minor:
          type: integer
        issued_at:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
          nullable: true
        payment_failed_at:
          type: string
          format: date-time
          nullable: true
        payment_status_updated_at:
          type: string
          format: date-time
          nullable: true

    ParentInvoiceDetail:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_kind:
          type: string
        invoice_number:
          type: string
        invoice_number_display:
          type: string
        child_id:
          type: string
        child_name:
          type: string
        billing_month:
          type: string
        period:
          $ref: "#/components/schemas/InvoicePeriod"
        status:
          type: string
        due_status:
          type: string
        currency_code:
          type: string
        subtotal_minor:
          type: integer
        funded_deduction_minor:
          type: integer
        total_due_minor:
          type: integer
        amount_paid_minor:
          type: integer
        issued_at:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
          nullable: true
        payment_failed_at:
          type: string
          format: date-time
          nullable: true
        payment_status_updated_at:
          type: string
          format: date-time
          nullable: true
        calculation:
          type: object
          properties:
            core_hourly_rate_minor:
              type: integer
            raw_attended_minutes:
              type: integer
            rounded_attended_minutes:
              type: integer
            funded_allowance_minutes:
              type: integer
            funded_deduction_minutes:
              type: integer
            core_billable_minutes:
              type: integer
            included_session_count:
              type: integer
            core_subtotal_minor:
              type: integer
            extras_total_minor:
              type: integer
        lines:
          type: array
          items:
            type: object
            properties:
              line_kind:
                type: string
              description:
                type: string
              sort_order:
                type: integer
              quantity_minutes:
                type: integer
                nullable: true
              unit_amount_minor:
                type: integer
                nullable: true
              line_amount_minor:
                type: integer

    CheckoutSessionResponse:
      type: object
      properties:
        checkout_session_id:
          type: string
        checkout_url:
          type: string
          format: uri
        payment_attempt_id:
          type: string
          format: uuid

    WebhookResponse:
      type: object
      properties:
        status:
          type: string
          enum: [processed, ignored, rejected, duplicate]

    PreflightResponse:
      type: object
      properties:
        billing_month:
          type: string
        currency_code:
          type: string
        period:
          type: object
          properties:
            start_date:
              type: string
            end_date:
              type: string
            end_exclusive_date:
              type: string
        summary:
          type: object
          properties:
            total_children_count:
              type: integer
            eligible_children_count:
              type: integer
            blocked_children_count:
              type: integer
            included_session_count:
              type: integer
            raw_attended_minutes:
              type: integer
            rounded_attended_minutes:
              type: integer
            funded_allowance_minutes:
              type: integer
            funded_deduction_minutes:
              type: integer
            core_billable_minutes:
              type: integer
            subtotal_minor:
              type: integer
            funded_deduction_minor:
              type: integer
            total_due_minor:
              type: integer
            blocker_counts:
              type: array
              items:
                type: object
                properties:
                  code:
                    type: string
                  children_count:
                    type: integer
        eligible_children:
          type: array
          items:
            type: object
            properties:
              child_id:
                type: string
              child_name:
                type: string
              core_hourly_rate_minor:
                type: integer
              funding_profile_id:
                type: string
                nullable: true
              funded_allowance_minutes:
                type: integer
              raw_attended_minutes:
                type: integer
              rounded_attended_minutes:
                type: integer
              included_session_count:
                type: integer
              funded_deduction_minutes:
                type: integer
              core_billable_minutes:
                type: integer
              subtotal_minor:
                type: integer
              funded_deduction_minor:
                type: integer
              total_due_minor:
                type: integer
              existing_invoice:
                type: object
                nullable: true
        blocked_children:
          type: array
          items:
            type: object
            properties:
              child_id:
                type: string
              child_name:
                type: string
              blockers:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                    message:
                      type: string
                    field:
                      type: string
                      nullable: true

    DraftGenerationResponse:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        billing_month:
          type: string
        status:
          type: string
          enum: [completed, completed_with_exceptions]
        summary:
          type: object
          properties:
            eligible_count:
              type: integer
            success_count:
              type: integer
            blocked_count:
              type: integer
            total_due_minor:
              type: integer
        generated:
          type: array
          items:
            type: object
            properties:
              child_id:
                type: string
              child_name:
                type: string
              action:
                type: string
                enum: [created, updated]
              invoice_id:
                type: string
              subtotal_minor:
                type: integer
              funded_deduction_minor:
                type: integer
              total_due_minor:
                type: integer
        blocked:
          type: array
          items:
            type: object
            properties:
              child_id:
                type: string
              child_name:
                type: string
              blockers:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                    message:
                      type: string

    IssueInvoiceResponse:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        status:
          type: string
          enum: [issued]
        issued_at:
          type: string
          format: date-time
        locked_at:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
        issued_run_id:
          type: string
          format: uuid
        total_due_minor:
          type: integer

    BulkIssueResponse:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        billing_month:
          type: string
        status:
          type: string
          enum: [completed, completed_with_exceptions]
        summary:
          type: object
          properties:
            total_count:
              type: integer
            issued_count:
              type: integer
            blocked_count:
              type: integer
            total_due_minor:
              type: integer
        issued:
          type: array
          items:
            type: object
            properties:
              invoice_id:
                type: string
              invoice_number:
                type: string
              child_id:
                type: string
              child_name:
                type: string
              status:
                type: string
              issued_at:
                type: string
              locked_at:
                type: string
              due_at:
                type: string
              total_due_minor:
                type: integer
        blocked:
          type: array
          items:
            type: object
            properties:
              invoice_id:
                type: string
              child_id:
                type: string
              child_name:
                type: string
              blockers:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                    message:
                      type: string

    PaymentAttempt:
      type: object
      properties:
        payment_attempt_id:
          type: string
          format: uuid
        status:
          type: string
        amount_minor:
          type: integer
        currency_code:
          type: string
        stripe_checkout_session_id:
          type: string
          nullable: true
        stripe_payment_intent_id:
          type: string
          nullable: true
        stripe_expires_at:
          type: string
          format: date-time
          nullable: true
        failure_reason:
          type: string
          nullable: true
        provider_error_code:
          type: string
          nullable: true
        provider_error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaymentEvent:
      type: object
      properties:
        payment_event_id:
          type: string
          format: uuid
        payment_attempt_id:
          type: string
          format: uuid
        stripe_event_id:
          type: string
          nullable: true
        stripe_event_type:
          type: string
          nullable: true
        stripe_checkout_session_id:
          type: string
          nullable: true
        stripe_payment_intent_id:
          type: string
          nullable: true
        outcome:
          type: string
        reason_code:
          type: string
        previous_invoice_status:
          type: string
          nullable: true
        new_invoice_status:
          type: string
          nullable: true
        attempt_previous_status:
          type: string
          nullable: true
        attempt_new_status:
          type: string
          nullable: true
        amount_minor:
          type: integer
          nullable: true
        currency_code:
          type: string
          nullable: true
        webhook_processing_status:
          type: string
        webhook_processing_reason:
          type: string
          nullable: true
        webhook_received_at:
          type: string
          format: date-time
          nullable: true
        webhook_processed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ManagerPaymentStatusResponse:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_kind:
          type: string
        invoice_number:
          type: string
          nullable: true
        invoice_number_display:
          type: string
        child_id:
          type: string
          format: uuid
        child_name:
          type: string
        billing_month:
          type: string
        status:
          type: string
        due_status:
          type: string
        currency_code:
          type: string
        total_due_minor:
          type: integer
        amount_paid_minor:
          type: integer
        issued_at:
          type: string
          format: date-time
          nullable: true
        due_at:
          type: string
          format: date-time
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        payment_failed_at:
          type: string
          format: date-time
          nullable: true
        payment_status_updated_at:
          type: string
          format: date-time
          nullable: true
        checkout_retry_available:
          type: boolean
        checkout_retry_reason_code:
          type: string
        latest_payment_attempt:
          $ref: "#/components/schemas/PaymentAttempt"
          nullable: true
        latest_payment_event:
          $ref: "#/components/schemas/PaymentEvent"
          nullable: true

    PaginatedPaymentEvents:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PaymentEvent"
        limit:
          type: integer
        offset:
          type: integer

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: validation_error
            message: Invalid request payload.
            request_id: "00000000-0000-0000-0000-000000000001"
            details:
              field: email

    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: unauthorized
            message: Invalid credentials or session.
            request_id: "00000000-0000-0000-0000-000000000001"

    ForbiddenRole:
      description: Authenticated but wrong role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: forbidden_role
            message: Access denied.
            request_id: "00000000-0000-0000-0000-000000000001"

    ForbiddenScopeSelection:
      description: CSRF failure or scope mismatch
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: forbidden_scope_selection
            message: Access denied.
            request_id: "00000000-0000-0000-0000-000000000001"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: not_found
            message: Resource not found.
            request_id: "00000000-0000-0000-0000-000000000001"

    Conflict:
      description: Conflict with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: conflict
            message: Conflict.
            request_id: "00000000-0000-0000-0000-000000000001"

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: rate_limited
            message: Too many requests.
            request_id: "00000000-0000-0000-0000-000000000001"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: internal_error
            message: Something went wrong.
            request_id: "00000000-0000-0000-0000-000000000001"

    PaymentProviderError:
      description: Stripe error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: payment_provider_error
            message: Payment provider error.
            request_id: "00000000-0000-0000-0000-000000000001"

    PaymentProviderUnconfigured:
      description: Stripe not configured (local/dev)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: payment_provider_unconfigured
            message: Payment provider not configured.
            request_id: "00000000-0000-0000-0000-000000000001"

    DatabaseUnavailable:
      description: Database unreachable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: db_unavailable
            message: Service unavailable.
            request_id: "00000000-0000-0000-0000-000000000001"

  parameters:
    child_id:
      name: child_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    guardian_id:
      name: guardian_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    invoice_id:
      name: invoice_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    invite_id:
      name: invite_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

paths:
  /health:
    get:
      operationId: getHealth
      summary: Root health check
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          $ref: "#/components/responses/DatabaseUnavailable"

  /api/v1/health:
    get:
      operationId: getApiHealth
      summary: API health check
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          $ref: "#/components/responses/DatabaseUnavailable"

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics endpoint
      tags: [Health]
      security: []
      x-implementation-status: conditional
      description: "Returns Prometheus text metrics. Registered only when MetricsEnabled is true."
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain; version=0.0.4:
              schema:
                type: string

  /api/v1/auth/login:
    post:
      operationId: authLogin
      summary: Login with email/password
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                membership_id:
                  type: string
                  format: uuid
                  description: Required after a membership_selection_required challenge, or when the client already knows the intended membership. Omit for initial sign-in.
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          headers:
            Set-Cookie:
              description: "Sets refresh_token (HttpOnly) and csrf_token cookies"
              schema:
                type: string
        "400":
          description: Validation error or membership selection challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/MembershipSelectionRequiredResponse"
              examples:
                validation_error:
                  value:
                    code: validation_error
                    message: Invalid request payload.
                    request_id: "00000000-0000-0000-0000-000000000001"
                    details:
                      field: membership_id
                membership_selection_required:
                  value:
                    code: membership_selection_required
                    message: "Choose a nursery to continue."
                    request_id: "00000000-0000-0000-0000-000000000001"
                    available_memberships:
                      - membership_id: "00000000-0000-0000-0000-000000000010"
                        tenant_id: "00000000-0000-0000-0000-000000000020"
                        tenant_name: "Little Sprouts Nursery"
                        branch_id: "00000000-0000-0000-0000-000000000030"
                        branch_name: "Main Branch"
                        role: manager
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Refresh access token
      tags: [Auth]
      description: Cookie-backed, CSRF-protected session action. No request body.
      security:
        - refreshTokenCookie: []
          csrfCookie: []
          csrfHeader: []
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenScopeSelection"

  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Logout and clear session
      tags: [Auth]
      description: Cookie-backed. CSRF-protected when refresh cookie present. Clears cookies. Idempotent.
      security:
        - refreshTokenCookie: []
          csrfCookie: []
          csrfHeader: []
        - {}
      responses:
        "204":
          description: Session cleared

  /api/v1/auth/switch-membership:
    post:
      operationId: authSwitchMembership
      summary: Switch active membership
      tags: [Auth]
      description: Cookie-backed, CSRF-protected session action.
      security:
        - refreshTokenCookie: []
          csrfCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [membership_id]
              properties:
                membership_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Membership switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenScopeSelection"

  /api/v1/auth/password-reset-requests:
    post:
      operationId: requestPasswordReset
      summary: Request password reset token
      tags: [Password Reset]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Accepted (same response for known/unknown emails)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/password-resets:
    post:
      operationId: resetPassword
      summary: Reset password with token
      tags: [Password Reset]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "204":
          description: Password reset successful
        "400":
          description: Validation or token error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validation_error:
                  value:
                    code: validation_error
                    message: Invalid payload.
                    request_id: "00000000-0000-0000-0000-000000000001"
                token_invalid:
                  value:
                    code: password_reset_token_invalid
                    message: Token does not exist.
                    request_id: "00000000-0000-0000-0000-000000000001"
                token_expired:
                  value:
                    code: password_reset_token_expired
                    message: Token has expired.
                    request_id: "00000000-0000-0000-0000-000000000001"
                token_used:
                  value:
                    code: password_reset_token_used
                    message: Token has already been used.
                    request_id: "00000000-0000-0000-0000-000000000001"

  /api/v1/invites/accept:
    post:
      operationId: acceptInvite
      summary: Accept invite and set password
      tags: [Invites]
      description: Public. Rate limited.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "204":
          description: Invite accepted
        "400":
          description: Validation or token error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/invites:
    post:
      operationId: createInvite
      summary: Create invite
      tags: [Invites]
      x-roles: [manager]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [practitioner, parent]
      responses:
        "200":
          description: Existing pending invite refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "201":
          description: New invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "409":
          description: |
            Conflict. x-known-contract-gap: invite_email_already_registered, invite_scope_conflict,
            invite_role_not_allowed, and invite_not_pending currently surface as HTTP 500
            due to error mapper gaps. These codes should map to 400/409 but the
            error mapper does not route them to their intended HTTP status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listInvites
      summary: List invites
      tags: [Invites]
      x-roles: [manager]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, revoked, expired, all]
            default: pending
      responses:
        "200":
          description: Invite list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/InviteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"

  /api/v1/invites/{invite_id}/resend:
    post:
      operationId: resendInvite
      summary: Resend pending invite
      tags: [Invites]
      x-roles: [manager]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/invite_id"
      responses:
        "200":
          description: Invite resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/invites/{invite_id}/revoke:
    post:
      operationId: revokeInvite
      summary: Revoke pending invite
      tags: [Invites]
      x-roles: [manager]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/invite_id"
      responses:
        "200":
          description: Invite revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/children:
    get:
      operationId: listChildren
      summary: List children
      tags: [Children]
      x-roles: [manager]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, all]
            default: active
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Children list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Child"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"

    post:
      operationId: createChild
      summary: Create child
      tags: [Children]
      x-roles: [manager]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, date_of_birth, start_date, core_hourly_rate_minor]
              properties:
                full_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                core_hourly_rate_minor:
                  type: integer
                notes:
                  type: string
      responses:
        "201":
          description: Child created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"

  /api/v1/children/attendance:
    get:
      operationId: listAttendanceChildren
      summary: List children with current attendance state
      tags: [Children, Attendance]
      x-roles: [manager, practitioner]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Children with attendance state for current day
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttendanceChild"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"

  /api/v1/children/{child_id}:
    get:
      operationId: getChild
      summary: Get child by ID
      tags: [Children]
      x-roles: [manager]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/child_id"
      responses:
        "200":
          description: Child detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateChild
      summary: Partial update child
      tags: [Children]
      x-roles: [manager]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/child_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                core_hourly_rate_minor:
                  type: integer
                notes:
                  type: string
      responses:
        "200":
          description: Updated child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/children/{child_id}/actions/mark-inactive:
    post:
      operationId: markChildInactive
      summary: Mark child as inactive
      tags: [Children]
      x-roles: [manager]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/child_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Child marked inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
