openapi: 3.0.3
info:
  title: Nursery Management System API
  version: 0.2.0
  description: |
    Canonical OpenAPI contract for the Nursery Management System API.
    Aligned with current Gin route registration in `api/internal/app/bootstrap/bootstrap.go` and module handlers.
    Includes operational/debug routes and deferred proposed contracts.
  contact:
    name: Nursery API
servers:
  - url: /
    description: Same-origin (dev/proxy)

tags:
  - name: Health
    description: Health check and operational routes
  - name: Auth
    description: Authentication and session management
  - name: Password Reset
    description: Password reset flow
  - name: Invites
    description: Manager invite management and public acceptance
  - name: Children
    description: Child CRUD, lifecycle, and attendance list
  - name: Guardians
    description: Guardian CRUD and lifecycle
  - name: Guardian-Child Links
    description: Create and end guardian-child relationships
  - name: Parent Mappings
    description: Create and end parent membership-guardian mappings
  - name: Attendance
    description: Check-in, check-out, and corrections
  - name: Absence
    description: Absence markers
  - name: Funding
    description: Child funding profile management
  - name: Invoices
    description: Manager invoice draft generation, review, and issue
  - name: Parent Invoices
    description: Parent-facing invoice views
  - name: Payments
    description: Stripe checkout, webhooks, and payment diagnostics
  - name: Owner
    description: Owner site overview, billing setup, and manager access
  - name: Deferred
    description: Proposed contracts not yet implemented

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Authorization: Bearer <access_token>"
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly cookie set after login/refresh
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_token
      description: Readable cookie containing CSRF token value
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Must match csrf_token cookie value
    stripeSignature:
      type: apiKey
      in: header
      name: Stripe-Signature
      description: Stripe webhook signature header

  headers:
    X-Request-ID:
      description: Unique request identifier, preserved or generated
      schema:
        type: string
        format: uuid
    X-Correlation-ID:
      description: Correlation identifier for distributed tracing
      schema:
        type: string

  schemas:
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        request_id:
          type: string
          format: uuid
        details:
          description: Optional field-level details
          nullable: true
          type: object
          additionalProperties: true
      example:
        code: validation_error
        message: Invalid request payload.
        request_id: "00000000-0000-0000-0000-000000000001"
        details:
          field: email

    OwnerAttendanceSummary:
      type: object
      properties:
        checked_in_today_count:
          type: integer
        incomplete_attendance_count:
          type: integer

    OwnerFundingReadiness:
      type: object
      properties:
        included_child_count:
          type: integer
        flagged_child_count:
          type: integer
        missing_profile_count:
          type: integer
        explicit_zero_count:
          type: integer
        under_one_hour_count:
          type: integer
        above_160_hours_count:
          type: integer

    OwnerInvoicePaymentHealth:
      type: object
      properties:
        draft_count:
          type: integer
        issued_count:
          type: integer
        overdue_count:
          type: integer
        payment_failed_count:
          type: integer
        paid_count:
          type: integer
        total_issued_minor:
          type: integer
        total_paid_minor:
          type: integer
        outstanding_minor:
          type: integer
        overdue_outstanding_minor:
          type: integer
        failed_payment_count:
          type: integer

    OwnerSiteSummary:
      type: object
      properties:
        site_id:
          type: string
          format: uuid
        site_name:
          type: string
        setup_status:
          type: string
        active_manager_count:
          type: integer
        pending_manager_invite_count:
          type: integer
        active_children_count:
          type: integer
        site_core_hourly_rate_minor:
          type: integer
          nullable: true
          description: Positive GBP pence per hour, or null when not set
          minimum: 1
        setup_issues:
          type: array
          items:
            type: string
        attendance:
          $ref: "#/components/schemas/OwnerAttendanceSummary"
        funding_readiness:
          $ref: "#/components/schemas/OwnerFundingReadiness"
        invoice_payment_health:
          $ref: "#/components/schemas/OwnerInvoicePaymentHealth"

    OwnerSiteSummaryTotals:
      type: object
      properties:
        active_manager_count:
          type: integer
        pending_manager_invite_count:
          type: integer
        active_children_count:
          type: integer
        checked_in_today_count:
          type: integer
        incomplete_attendance_count:
          type: integer
        draft_count:
          type: integer
        issued_count:
          type: integer
        overdue_count:
          type: integer
        payment_failed_count:
          type: integer
        paid_count:
          type: integer
        total_issued_minor:
          type: integer
        total_paid_minor:
          type: integer
        outstanding_minor:
          type: integer
        overdue_outstanding_minor:
          type: integer

    OwnerSiteSummariesResponse:
      type: object
      properties:
        billing_month:
          type: string
        attendance_local_date:
          type: string
        currency_code:
          type: string
        totals:
          $ref: "#/components/schemas/OwnerSiteSummaryTotals"
        sites:
          type: array
          items:
            $ref: "#/components/schemas/OwnerSiteSummary"

    UpdateSiteBillingSetupRequest:
      type: object
      required: [core_hourly_rate_minor]
      properties:
        core_hourly_rate_minor:
          type: integer
          minimum: 1
          description: Positive GBP pence per hour

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string
          format: uuid

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in_seconds:
          type: integer
        user:
          $ref: "#/components/schemas/UserResponse"
        active_membership:
          $ref: "#/components/schemas/MembershipResponse"
        available_memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipResponse"

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    MembershipResponse:
      type: object
      properties:
        membership_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        tenant_name:
          type: string
          description: Display-safe nursery/tenant name for picker labels
        branch_id:
          type: string
          format: uuid
          nullable: true
          description: Null for owner memberships (tenant-wide scope)
        branch_name:
          type: string
          nullable: true
          description: Display-safe branch name for picker labels. Null for owner memberships.
        role:
          type: string
          enum: [owner, manager, practitioner, parent]

    MembershipSelectionRequiredResponse:
      type: object
      description: Pre-session membership selection challenge. No auth cookies, no access token, no session.
      required: [code, message, request_id, available_memberships]
      properties:
        code:
          type: string
          example: membership_selection_required
        message:
          type: string
          description: "Initial: 'Choose a nursery to continue.' Stale: 'That access is no longer available. Choose another nursery or contact your manager.'"
        request_id:
          type: string
          format: uuid
        available_memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipResponse"

    Child:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        core_hourly_rate_minor:
          type: integer
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
        left_at:
          type: string
          format: date-time
          nullable: true
        left_reason_code:
          type: string
          nullable: true
        left_reason_note:
          type: string
          nullable: true
        enrollment_complete:
          type: boolean
        missing_requirements:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Guardian:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
        deactivated_at:
          type: string
          format: date-time
          nullable: true
        deactivation_reason_code:
          type: string
          nullable: true
        deactivation_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GuardianChildLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        guardian_id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        ended_at:
          type: string
          format: date-time
          nullable: true
        ended_reason_code:
          type: string
          nullable: true
        ended_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChildGuardianLinkItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        guardian_id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        guardian:
          type: object
          properties:
            id:
              type: string
              format: uuid
            full_name:
              type: string
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true
            is_active:
              type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ParentMembershipGuardianMapping:
      type: object
      properties:
        id:
          type: string
          format: uuid
        membership_id:
          type: string
          format: uuid
        guardian_id:
          type: string
          format: uuid
        ended_at:
          type: string
          format: date-time
          nullable: true
        ended_reason_code:
          type: string
          nullable: true
        ended_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, complete, corrected]
        check_in_at:
          type: string
          format: date-time
        check_out_at:
          type: string
          format: date-time
          nullable: true
        check_in_local_date:
          type: string
          format: date
        check_out_local_date:
          type: string
          format: date
          nullable: true
        duration_minutes:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceCorrectionSessionContext:
      type: object
      properties:
        child_id:
          type: string
          format: uuid
        selected_local_date:
          type: string
          format: date
        invoice_warning:
          $ref: "#/components/schemas/IssuedInvoiceWarning"
        items:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceSession"

    AttendanceCorrectionHistory:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/AttendanceSession"
        items:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceCorrectionHistoryEvent"

    AttendanceCorrectionHistoryEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
          enum: [check_in, check_out, correction]
        occurred_at:
          type: string
          format: date-time
        local_date:
          type: string
          format: date
        recorded_by_user_id:
          type: string
          format: uuid
        recorded_by_membership_id:
          type: string
          format: uuid
        recorded_by_label:
          type: string
          nullable: true
        reason_code:
          type: string
          nullable: true
        reason_note:
          type: string
          nullable: true
        previous_check_in_at:
          type: string
          format: date-time
          nullable: true
        previous_check_out_at:
          type: string
          format: date-time
          nullable: true
        corrected_check_in_at:
          type: string
          format: date-time
          nullable: true
        corrected_check_out_at:
          type: string
          format: date-time
          nullable: true
        created_by_correction:
          type: boolean

    IssuedInvoiceWarning:
      type: object
      nullable: true
      properties:
        billing_month:
          type: string
        invoice_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        status:
          type: string

    AttendanceChild:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        enrollment_complete:
          type: boolean
        attendance_state:
          type: string
          enum: [not_checked_in, checked_in, absent]
        open_session_id:
          type: string
          format: uuid
          nullable: true
        checked_in_at:
          type: string
          format: date-time
          nullable: true
        has_incomplete_session:
          type: boolean
        absence_marker_id:
          type: string
          format: uuid
          nullable: true
        absence_marked_at:
          type: string
          format: date-time
          nullable: true

    AbsenceMarker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        local_date:
          type: string
          format: date
        marked_at:
          type: string
          format: date-time
        cleared_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FundingProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        billing_month:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}$"
        funded_allowance_minutes:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InviteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [practitioner, parent]
        status:
          type: string
          enum: [pending, accepted, revoked, expired]
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReasonRequest:
      type: object
      required: [reason_code]
      properties:
        reason_code:
          type: string
          enum:
            [
              duplicate_record,
              entered_in_error,
              left_nursery,
              safeguarding_direction,
              contact_update,
              access_revoked,
              other,
            ]
        reason_note:
          type: string
          description: Required when reason_code is other

    InvoicePeriod:
      type: object
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date

    InvoiceListItem:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_kind:
          type: string
          enum: [monthly]
        invoice_number:
          type: string
          nullable: true
        invoice_number_display:
          type: string
        child_id:
          type: string
          format: uuid
        child_name:
          type: string
        billing_month:
          type: string
        period:
          $ref: "#/components/schemas/InvoicePeriod"
        status:
          type: string
          enum: [draft, issued, payment_failed, paid, overdue]
        due_status:
          type: string
          enum: [not_due, due, overdue, paid]
        currency_code:
          type: string
        subtotal_minor:
          type: integer
        funded_deduction_minor:
          type: integer
        total_due_minor:
          type: integer
        amount_paid_minor:
          type: integer
        due_at:
          type: string
          format: date-time
          nullable: true
        issued_at:
          type: string
          format: date-time
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        payment_failed_at:
          type: string
          format: date-time
          nullable: true
        payment_status_updated_at:
          type: string
          format: date-time
          nullable: true
        generated_run_id:
          type: string
          format: uuid
          nullable: true
        generated_run_status:
          type: string
          nullable: true
        generated_run_started_at:
          type: string
          format: date-time
          nullable: true
        generated_run_completed_at:
          type: string
          format: date-time
          nullable: true
        generated_run_exception_count:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InvoiceDetail:
      type: object
      description: Full invoice detail including lines, calculation, and run exceptions
      properties:
        invoice_id:
          type: string
          format: uuid
        invoice_kind:
          type: string
          enum: [monthly]
        invoice_number:
          type: string
          nullable: true
        invoice_number_display:
          type: string
        child_id:
          type: string
          format: uuid
        child_name:
          type: string
        billing_month:
          type: string
        period:
          $ref: "#/components/schemas/InvoicePeriod"
        status:
          type: string
          enum: [draft, issued, payment_failed, paid, overdue]
        due_status:
          type: string
          enum: [not_due, due, overdue, paid]
        currency_code:
          type: string
        subtotal_minor:
          type: integer
        funded_deduction_minor:
          type: integer
        total_due_minor:
          type: integer
        amount_paid_minor:
          type: integer
        issued_at:
          type: string
          format: date-time
          nullable: true
        locked_at:
          type: string
          format: date-time
          nullable: true
        due_at:
          type: string
          format: date-time
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        payment_failed_at:
          type: string
          format: date-time
          nullable: true
        payment_status_updated_at:
          type: string
          format: date-time
          nullable: true
        adjusts_invoice_id:
          type: string
          format: uuid
          nullable: true
        adjustment_reason_code:
          type: string
          nullable: true
        adjustment_reason_note:
          type: string
          nullable: true
        generated_run_id:
          type: string
          format: uuid
          nullable: true
        generated_run_status:
          type: string
          nullable: true
        generated_run_started_at:
          type: string
          format: date-time
          nullable: true
        generated_run_completed_at:
          type: string
          format: date-time
          nullable: true
        generated_run_exception_count:
          type: integer
          nullable: true
        generated_run_exceptions:
          type: array
          items:
            type: object
            properties:
              child_id:
                type: string
              child_name:
                type: string
              blocker_codes:
                type: array
                items:
                  type: string
        calculation:
          type: object
          properties:
            core_hourly_rate_minor:
              type: integer
              nullable: true
              description: Core hourly rate in minor units (pence), null when not set
              minimum: 0
            default: 0

    CompleteRegistrationRequest:
      type: object
      description: Complete registration payload sent by the guided intake stepper at step 5
      required: [child, consents]
      properties:
        child:
          type: object
          required: [full_name, date_of_birth, start_date]
          properties:
            full_name:
              type: string
            date_of_birth:
              type: string
              format: date
            start_date:
              type: string
              format: date
            notes:
              type: string
        registration_profile:
          type: object
          description: All registration profile sections
          properties:
            demographics_home:
              type: object
            medical_dietary:
              type: object
            health_contacts:
              type: object
            social_development:
              type: object
              properties:
                social_services_status:
                  type: string
                  nullable: true
                  enum: [unknown, yes, no]
                social_services_notes:
                  type: string
                  nullable: true
                social_worker_name:
                  type: string
                  nullable: true
                social_worker_phone:
                  type: string
                  nullable: true
                social_worker_email:
                  type: string
                  nullable: true
                concern_walking:
                  type: string
                  nullable: true
                concern_speech_language:
                  type: string
                  nullable: true
                concern_hearing:
                  type: string
                  nullable: true
                concern_sight:
                  type: string
                  nullable: true
                concern_emotional_wellbeing:
                  type: string
                  nullable: true
                concern_behaviour:
                  type: string
                  nullable: true
                professional_referrals:
                  type: array
                  items:
                    type: object
                social_development_reviewed:
                  type: boolean
            parent_carers:
              type: array
              items:
                type: object
            emergency_contacts:
              type: array
              items:
                type: object
            authorised_collectors:
              type: array
              items:
                type: object
            collection:
              type: object
            funding_support:
              type: object
            routine_care:
              type: object
            gdpr_declaration:
              type: object
        consents:
          type: object
          required: [signer_name, signed_date]
          properties:
            signer_name:
              type: string
            signed_date:
              type: string
              format: date
            paper_form_on_file:
              type: boolean
            urgent_medical_treatment:
              type: boolean
            urgent_medical_treatment_exceptions:
              type: string
              nullable: true
            plasters:
              type: boolean
            safeguarding_reporting_acknowledgement:
              type: boolean
            area_senco_liaison:
              type: boolean
            health_visitor_liaison:
              type: boolean
            transition_documents:
              type: boolean
            local_outings:
              type: boolean
            face_painting:
              type: boolean
            parent_supplied_sun_cream:
              type: boolean
            parent_supplied_nappy_cream:
              type: boolean
            development_profile_photos:
              type: boolean
            nursery_display_boards:
              type: boolean
            promotional_literature:
              type: boolean
            nursery_website:
              type: boolean
            staff_student_coursework:
              type: boolean
            social_media:
              type: boolean
            social_media_channel_notes:
              type: string
              nullable: true
            notes_exceptions:
              type: string
