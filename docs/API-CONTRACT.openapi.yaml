  /api/v1/sites/{site_id}/rooms:
    get:
      tags: [Rooms]
      summary: List rooms for a site
      description: |
        Returns rooms in the requested site. Active rooms only by default; pass
        `include_archived=true` to include archived rooms. Pass `include=occupancy`
        to attach `assigned_count` (children with a current `child_room_assignments`
        row in the room) and `is_over_capacity` to each room. Without the flag,
        those fields are absent and the response is unchanged.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include
          in: query
          required: false
          description: Set to `occupancy` to add `assigned_count` and `is_over_capacity` to each room.
          schema:
            type: string
            enum: [occupancy]
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
    post:
      tags: [Rooms]
      summary: Create a room in a site
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sites/{site_id}/rooms/{room_id}:
    get:
      tags: [Rooms]
      summary: Get a room by id
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Room record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Rooms]
      summary: Update a room
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomRequest"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sites/{site_id}/rooms/{room_id}/actions/archive:
    post:
      tags: [Rooms]
      summary: Archive a room
      description: |
        Archives a room. Returns HTTP 409 with code `room_has_children` and
        `details.assigned_count` when active children still have this room as
        their primary room. The UI uses `assigned_count` to show how many
        children need to be reassigned before archiving.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Room archived
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenRole"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/sites/{site_id}/rooms/{room_id}/actions/activate:
    post:
