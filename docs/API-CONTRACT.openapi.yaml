openapi: 3.0.3
info:
  title: Nursery Management System API
  version: 0.2.0
  description: |
    Canonical OpenAPI contract for the Nursery Management System API.
    Aligned with current Gin route registration in `api/internal/app/bootstrap/bootstrap.go` and module handlers.
    Includes operational/debug routes and deferred proposed contracts.
  contact:
    name: Nursery API
servers:
  - url: /
    description: Same-origin (dev/proxy)

tags:
  - name: Health
    description: Health check and operational routes
  - name: Auth
    description: Authentication and session management
  - name: Password Reset
    description: Password reset flow
  - name: Invites
    description: Manager invite management and public acceptance
  - name: Children
    description: Child CRUD, lifecycle, and attendance list
  - name: Guardians
    description: Guardian CRUD and lifecycle
  - name: Guardian-Child Links
    description: Create and end guardian-child relationships
  - name: Parent Mappings
    description: Create and end parent membership-guardian mappings
  - name: Attendance
    description: Check-in, check-out, and corrections
  - name: Absence
    description: Absence markers
  - name: Funding
    description: Child funding profile management
  - name: Invoices
    description: Manager invoice draft generation, review, and issue
  - name: Parent Invoices
    description: Parent-facing invoice views
  - name: Payments
    description: Stripe checkout, webhooks, and payment diagnostics
  - name: Owner
    description: Owner site overview, billing setup, and manager access
  - name: Rooms
    description: Room management, including primary-room occupancy counts for children
  - name: Terms
    description: 12-month fixed-term advance-pay Term lifecycle, schedule changes, and termination
  - name: Deferred
    description: Proposed contracts not yet implemented

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Authorization: Bearer <access_token>"
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly cookie set after login/refresh
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_token
      description: Readable cookie containing CSRF token value
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Must match csrf_token cookie value
    stripeSignature:
      type: apiKey
      in: header
      name: Stripe-Signature
      description: Stripe webhook signature header

  headers:
    X-Request-ID:
      description: Unique request identifier, preserved or generated
      schema:
        type: string
        format: uuid
    X-Correlation-ID:
      description: Correlation identifier for distributed tracing
      schema:
        type: string

  schemas:
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        request_id:
          type: string
          format: uuid
        details:
          description: Optional field-level details
          nullable: true
          type: object
          additionalProperties: true
      example:
        code: validation_error
        message: Invalid request payload.
        request_id: "00000000-0000-0000-0000-000000000001"
        details:
          field: email

    OwnerAttendanceSummary:
      type: object
      properties:
        checked_in_today_count:
          type: integer
        incomplete_attendance_count:
          type: integer

    OwnerFundingReadiness:
      type: object
      properties:
        included_child_count:
          type: integer
        flagged_child_count:
          type: integer
        missing_profile_count:
          type: integer
        explicit_zero_count:
          type: integer
        under_one_hour_count:
          type: integer
        above_160_hours_count:
          type: integer

    OwnerInvoicePaymentHealth:
      type: object
      properties:
        draft_count:
          type: integer
        issued_count:
          type: integer
        overdue_count:
          type: integer
        payment_failed_count:
          type: integer
        paid_count:
          type: integer
        total_issued_minor:
          type: integer
        total_paid_minor:
          type: integer
        outstanding_minor:
          type: integer
        overdue_outstanding_minor:
          type: integer
        failed_payment_count:
          type: integer

    OwnerSiteSummary:
      type: object
      properties:
        site_id:
          type: string
          format: uuid
        site_name:
          type: string
        setup_status:
          type: string
        active_manager_count:
          type: integer
        pending_manager_invite_count:
          type: integer
        active_children_count:
          type: integer
        site_core_hourly_rate_minor:
          type: integer
          nullable: true
          description: Positive GBP pence per hour, or null when not set
          minimum: 1
        setup_issues:
          type: array
          items:
            type: string
        attendance:
          $ref: "#/components/schemas/OwnerAttendanceSummary"
        funding_readiness:
          $ref: "#/components/schemas/OwnerFundingReadiness"
        invoice_payment_health:
          $ref: "#/components/schemas/OwnerInvoicePaymentHealth"

    OwnerSiteSummaryTotals:
      type: object
      properties:
        active_manager_count:
          type: integer
        pending_manager_invite_count:
          type: integer
        active_children_count:
          type: integer
        checked_in_today_count:
          type: integer
        incomplete_attendance_count:
          type: integer
        draft_count:
          type: integer
        issued_count:
          type: integer
        overdue_count:
          type: integer
        payment_failed_count:
          type: integer
        paid_count:
          type: integer
        total_issued_minor:
          type: integer
        total_paid_minor:
          type: integer
        outstanding_minor:
          type: integer
        overdue_outstanding_minor:
          type: integer

    OwnerSiteSummariesResponse:
      type: object
      properties:
        billing_month:
          type: string
        attendance_local_date:
          type: string
        currency_code:
          type: string
        totals:
          $ref: "#/components/schemas/OwnerSiteSummaryTotals"
        sites:
          type: array
          items:
            $ref: "#/components/schemas/OwnerSiteSummary"

    UpdateSiteBillingSetupRequest:
      type: object
      required: [core_hourly_rate_minor]
      properties:
        core_hourly_rate_minor:
          type: integer
          minimum: 1
          description: Positive GBP pence per hour

    Room:
      type: object
      required: [id, name, age_group, capacity, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        age_group:
          type: string
          enum: [baby, toddler, preschool, mixed]
        capacity:
          type: integer
          minimum: 1
        is_active:
          type: boolean
        assigned_count:
          type: integer
          minimum: 0
          description: Number of children whose primary_room_id points at this room. Only present when `?include=occupancy` is set on the list endpoint.
        is_over_capacity:
          type: boolean
          description: True when assigned_count > capacity. Only present when `?include=occupancy` is set.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RoomListResponse:
      type: object
      required: [rooms]
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/Room"

    CreateRoomRequest:
      type: object
      required: [name, age_group, capacity]
      properties:
        name:
          type: string
          maxLength: 255
        age_group:
          type: string
          enum: [baby, toddler, preschool, mixed]
        capacity:
          type: integer
          minimum: 1
        description:
          type: string
          maxLength: 1000

    UpdateRoomRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        age_group:
          type: string
          enum: [baby, toddler, preschool, mixed]
        capacity:
          type: integer
          minimum: 1
        description:
          type: string
          maxLength: 1000

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string
          format: uuid

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in_seconds:
          type: integer
        user:
          $ref: "#/components/schemas/UserResponse"
        active_membership:
          $ref: "#/components/schemas/MembershipResponse"
        available_memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipResponse"

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    MembershipResponse:
      type: object
      properties:
        membership_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        tenant_name:
          type: string
          description: Display-safe nursery/tenant name for picker labels
        branch_id:
          type: string
          format: uuid
          nullable: true
          description: Null for owner memberships (tenant-wide scope)
        branch_name:
          type: string
          nullable: true
          description: Display-safe branch name for picker labels. Null for owner memberships.
        role:
          type: string
          enum: [owner, manager, practitioner, parent]

    MembershipSelectionRequiredResponse:
      type: object
      description: Pre-session membership selection challenge. No auth cookies, no access token, no session.
      required: [code, message, request_id, available_memberships]
      properties:
        code:
          type: string
          example: membership_selection_required
        message:
          type: string
          description: "Initial: 'Choose a nursery to continue.' Stale: 'That access is no longer available. Choose another nursery or contact your manager.'"
        request_id:
          type: string
          format: uuid
        available_memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipResponse"

    Child:
      type: object
      description: |
        Child identity row. Per-child profile, contacts, health, safeguarding,
        consent, funding, collection, room, billing, and leaving data live in
        dedicated sub-resource tables; use the per-resource endpoints below
        (`/children/:child_id/{profile,contacts,health,...}`).
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        middle_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        date_of_birth:
          type: string
          format: date
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
        has_current_room:
          type: boolean
          description: True when the child has a non-null current `child_room_assignments` row.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChildProfile:
      type: object
      description: Per-child demographics, home, access, GDPR declaration, section review flags.
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        sex: { type: string, nullable: true }
        religion: { type: string, nullable: true }
        ethnic_origin: { type: string, nullable: true }
        first_language: { type: string, nullable: true }
        other_languages: { type: string, nullable: true }
        home_address:
          type: object
          additionalProperties: true
        home_postcode: { type: string, nullable: true }
        home_telephone: { type: string, nullable: true }
        disability_status:
          type: string
          enum: [unknown, no, yes]
        disability_notes: { type: string, nullable: true }
        access_requirements: { type: string, nullable: true }
        routine_care_notes: { type: string, nullable: true }
        gdpr_declared_by_name: { type: string, nullable: true }
        gdpr_declared_at: { type: string, format: date-time, nullable: true }
        gdpr_declaration_date: { type: string, format: date, nullable: true }
        registration_date: { type: string, format: date, nullable: true }
        demographics_home_reviewed: { type: boolean }
        medical_dietary_reviewed: { type: boolean }
        health_contacts_reviewed: { type: boolean }
        social_development_reviewed: { type: boolean }
        parent_responsibility_reviewed: { type: boolean }
        emergency_collection_reviewed: { type: boolean }
        routine_care_reviewed: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChildContact:
      type: object
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        contact_type:
          type: string
          enum: [parent_carer, emergency_contact, authorised_collector]
        sort_order: { type: integer }
        full_name: { type: string }
        relationship_to_child: { type: string, nullable: true }
        address:
          type: object
          additionalProperties: true
        telephone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        work_address:
          type: object
          additionalProperties: true
        has_parental_responsibility: { type: boolean, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChildHealthProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        medical_conditions_status: { type: string, enum: [unknown, no, yes] }
        medical_conditions_notes: { type: string, nullable: true }
        prescribed_medication_status: { type: string, enum: [unknown, no, yes] }
        medication_notes: { type: string, nullable: true }
        immunisation_status:
          type: string
          enum: [unknown, up_to_date, refused, partial, not_recorded]
        immunisation_country: { type: string, nullable: true }
        illness_diagnosis_history: { type: string, nullable: true }
        dietary_requirements_status: { type: string, enum: [unknown, no, yes] }
        dietary_requirements_notes: { type: string, nullable: true }
        dietary_side_effects: { type: string, nullable: true }
        doctor_name: { type: string, nullable: true }
        doctor_address: { type: string, nullable: true }
        doctor_phone: { type: string, nullable: true }
        health_visitor_name: { type: string, nullable: true }
        health_visitor_address: { type: string, nullable: true }
        health_visitor_phone: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChildSafeguardingProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        social_services_status: { type: string, enum: [unknown, no, yes] }
        social_services_notes: { type: string, nullable: true }
        social_worker_name: { type: string, nullable: true }
        social_worker_phone: { type: string, nullable: true }
        social_worker_email: { type: string, nullable: true }
        concern_walking: { type: string, enum: [unknown, no, yes] }
        concern_speech_language: { type: string, enum: [unknown, no, yes] }
        concern_hearing: { type: string, enum: [unknown, no, yes] }
        concern_sight: { type: string, enum: [unknown, no, yes] }
        concern_emotional_wellbeing: { type: string, enum: [unknown, no, yes] }
        concern_behaviour: { type: string, enum: [unknown, no, yes] }
        professional_referrals:
          type: array
          items: { type: object, additionalProperties: true }
        restricted_notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChildConsentRecord:
      type: object
      description: |
        Single current row per child (no version column). PUT replaces the row.
        `safeguarding_reporting_acknowledgement` is a hard requirement.
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        urgent_medical_treatment: { type: boolean }
        urgent_medical_treatment_exceptions: { type: string, nullable: true }
        plasters: { type: boolean }
        safeguarding_reporting_acknowledgement: { type: boolean }
        information_sharing_consent: { type: boolean }
        gdpr_data_processing_consent: { type: boolean }
        area_senco_liaison: { type: boolean }
        health_visitor_liaison: { type: boolean }
        transition_documents: { type: boolean }
        local_outings: { type: boolean }
        face_painting: { type: boolean }
        parent_supplied_sun_cream: { type: boolean }
        parent_supplied_nappy_cream: { type: boolean }
        development_profile_photos: { type: boolean }
        nursery_display_boards: { type: boolean }
        promotional_literature: { type: boolean }
        nursery_website: { type: boolean }
        staff_student_coursework: { type: boolean }
        social_media: { type: boolean }
        social_media_channel_notes: { type: string, nullable: true }
        notes_exceptions: { type: string, nullable: true }
        signer_name: { type: string }
        signed_date: { type: string, format: date }
        paper_form_on_file: { type: boolean }
        entered_by_user_id: { type: string, format: uuid }
        entered_by_membership_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChildFundingRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        benefits_contribute_to_fees: { type: string, enum: [unknown, no, yes] }
        working_tax_credit: { type: string, enum: [unknown, no, yes] }
        college_uni_paid_to_parent: { type: string, enum: [unknown, no, yes] }
        college_uni_paid_to_nursery: { type: string, enum: [unknown, no, yes] }
        funding_3yo_term_time: { type: string, enum: [unknown, no, yes] }
        funding_2yo_term_time: { type: string, enum: [unknown, no, yes] }
        funding_support_notes: { type: string, nullable: true }
        funding_support_reviewed: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChildCollectionSettings:
      type: object
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        over_18_collection_acknowledged: { type: boolean }
        has_collection_password:
          type: boolean
          description: True when a collection password hash is set.
        collection_password_updated_at: { type: string, format: date-time, nullable: true }
        collection_password_updated_by_user_id: { type: string, format: uuid, nullable: true }
        collection_password_updated_by_membership_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChildCollectionPasswordRequest:
      type: object
      required: [collection_password]
      properties:
        collection_password:
          type: string
          minLength: 4
          description: Plain-text collection password; server hashes and stores.

    ChildRoomAssignment:
      type: object
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        room_id: { type: string, format: uuid }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date, nullable: true }
        is_current: { type: boolean }
        created_at: { type: string, format: date-time }

    ChildRoomAssignmentCreateRequest:
      type: object
      required: [room_id, start_date]
      properties:
        room_id: { type: string, format: uuid }
        start_date: { type: string, format: date }
        close_current: { type: boolean, default: true, description: Close any current assignment as of `start_date` (default true). }

    ChildBillingProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        billing_basis:
          type: string
          enum: [site_rate, custom]
        custom_rate_minor:
          type: integer
          nullable: true
        effective_from: { type: string, format: date }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChildLeavingRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        child_id: { type: string, format: uuid }
        left_at: { type: string, format: date-time }
        reason_code:
          type: string
          enum: [duplicate_record, entered_in_error, left_nursery, safeguarding_direction, contact_update, access_revoked, other]
        reason_note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Guardian:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
        deactivated_at:
          type: string
          format: date-time
          nullable: true
        deactivation_reason_code:
          type: string
          nullable: true
        deactivation_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GuardianChildLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        guardian_id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        ended_at:
          type: string
          format: date-time
          nullable: true
        ended_reason_code:
          type: string
          nullable: true
        ended_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChildGuardianLinkItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        guardian_id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        guardian:
          type: object
          properties:
            id:
              type: string
              format: uuid
            full_name:
              type: string
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true
            is_active:
              type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ParentMembershipGuardianMapping:
      type: object
      properties:
        id:
          type: string
          format: uuid
        membership_id:
          type: string
          format: uuid
        guardian_id:
          type: string
          format: uuid
        ended_at:
          type: string
          format: date-time
          nullable: true
        ended_reason_code:
          type: string
          nullable: true
        ended_reason_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, complete, corrected]
        check_in_at:
          type: string
          format: date-time
        check_out_at:
          type: string
          format: date-time
          nullable: true
        check_in_local_date:
          type: string
          format: date
        check_out_local_date:
          type: string
          format: date
          nullable: true
        duration_minutes:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceCorrectionSessionContext:
      type: object
      properties:
        child_id:
          type: string
          format: uuid
        selected_local_date:
          type: string
          format: date
        invoice_warning:
          $ref: "#/components/schemas/IssuedInvoiceWarning"
        items:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceSession"

    AttendanceCorrectionHistory:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/AttendanceSession"
        items:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceCorrectionHistoryEvent"

    AttendanceCorrectionHistoryEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
