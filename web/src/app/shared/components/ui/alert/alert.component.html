<div
  class="rounded-xl border p-4"
  [class.p-2]="compact"
  [ngClass]="variantClasses.container"
  [attr.role]="roleAttribute"
>
  <div class="flex items-start gap-3" [class.gap-2]="compact">
    <div class="-mt-0.5" [ngClass]="variantClasses.icon" [innerHTML]="iconSvg | safeHtml"></div>

    <div class="min-w-0 flex-1">
      @if (title) {
        <h4 class="mb-1 text-sm font-semibold text-gray-800 dark:text-white/90">
          {{ title }}
        </h4>
      }

      @if (message) {
        <p class="text-sm text-gray-500 dark:text-gray-400">{{ message }}</p>
      }

      <ng-content></ng-content>

      @if (showLink) {
        <a
          [routerLink]="linkHref"
          class="inline-block mt-3 text-sm font-medium text-gray-500 underline dark:text-gray-400"
        >
          {{ linkText }}
        </a>
      }
    </div>

    @if (dismissible) {
      <button
        type="button"
        (click)="dismissed.emit()"
        class="shrink-0 ml-2 -mr-1 -mt-1 rounded-lg p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 dark:text-gray-500 dark:hover:text-gray-300 dark:hover:bg-white/10 focus:outline-hidden focus:ring-2 focus:ring-gray-400/50"
        aria-label="Dismiss"
      >
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    }
  </div>
</div>
