<div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
  <h3 class="mb-4 text-lg font-semibold text-gray-800 dark:text-white/90">
    {{ mode === 'create' ? 'Create child' : 'Edit child' }}
  </h3>

  @if (serverError) {
    <app-alert variant="error" [message]="serverError" class="mb-4"></app-alert>
  }

  <form class="grid grid-cols-1 gap-4 md:grid-cols-2" (ngSubmit)="submit()">
    <app-form-field label="First name" [required]="true" [error]="fieldErrors['first_name'] || ''">
      <input
        name="first_name"
        [(ngModel)]="form.first_name"
        class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/20 dark:border-gray-700 dark:text-white/90"
        required
      />
    </app-form-field>

    <app-form-field label="Middle name" [error]="fieldErrors['middle_name'] || ''">
      <input
        name="middle_name"
        [(ngModel)]="form.middle_name"
        class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/20 dark:border-gray-700 dark:text-white/90"
      />
    </app-form-field>

    <app-form-field label="Last name" [error]="fieldErrors['last_name'] || ''">
      <input
        name="last_name"
        [(ngModel)]="form.last_name"
        class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/20 dark:border-gray-700 dark:text-white/90"
      />
    </app-form-field>

    <app-form-field label="Date of birth" [required]="true" [error]="fieldErrors['date_of_birth'] || ''">
      <app-date-picker name="date_of_birth" [(ngModel)]="form.date_of_birth" />
    </app-form-field>

    <app-form-field label="Start date" [required]="true" [error]="fieldErrors['start_date'] || ''">
      <app-date-picker name="start_date" [(ngModel)]="form.start_date" />
    </app-form-field>

    <app-form-field label="End date (optional)" [error]="fieldErrors['end_date'] || ''">
      <app-date-picker name="end_date" [(ngModel)]="form.end_date" />
    </app-form-field>

    <app-form-field
      label="Primary room"
      [required]="primaryRoomRequired"
      [error]="fieldErrors['primary_room_id'] || ''"
    >
      <app-select
        name="primary_room_id"
        [options]="roomOptions"
        [value]="form.primary_room_id"
        (valueChange)="form.primary_room_id = $event"
        [placeholderDisabled]="false"
        placeholder="Select a room"
      />
    </app-form-field>

    <app-form-field label="Notes (optional)">
      <input
        name="notes"
        [(ngModel)]="form.notes"
        class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/20 dark:border-gray-700 dark:text-white/90"
      />
    </app-form-field>

    <div class="col-span-full flex items-center gap-3 pt-2">
      <app-button type="submit" variant="primary" [loading]="submitting" [disabled]="primaryRoomMissing">
        {{ submitting ? 'Saving...' : mode === 'create' ? 'Create child' : 'Save changes' }}
      </app-button>
      <app-button type="button" variant="outline" (btnClick)="cancelled.emit()">Cancel</app-button>
    </div>
  </form>
</div>
